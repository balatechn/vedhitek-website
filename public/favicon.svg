
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260">
  <defs>
    <linearGradient id="grad3D" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C6FF"/>
      <stop offset="100%" stop-color="#7F00FF"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shadow -->
  <path d="M65 45 
           C125 205, 165 225, 205 235 
           C245 225, 285 205, 345 45 
           C285 145, 245 165, 205 175 
           C165 165, 125 145, 65 45 Z"
        fill="black"
        opacity="0.2"/>

  <!-- Main glowing V -->
  <path d="M60 40 
           C120 200, 160 220, 200 230 
           C240 220, 280 200, 340 40 
           C280 140, 240 160, 200 170 
           C160 160, 120 140, 60 40 Z"
        fill="url(#grad3D)"
        filter="url(#glow)"/>

  <!-- Neon inner stroke -->
  <path d="M110 70 
           C150 170, 180 190, 200 200 
           C220 190, 250 170, 290 70"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="8"
        stroke-linecap="round"
        opacity="0.9"/>
</svg>
